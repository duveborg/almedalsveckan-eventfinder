<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        background: #ece8df;
        color: #1a1620;
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Helvetica,
          Arial, sans-serif;
        overflow: hidden;
      }
      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        padding: 72px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .pin {
        position: absolute;
        right: -60px;
        top: -40px;
        width: 620px;
        height: 620px;
        opacity: 0.12;
        transform: rotate(8deg);
      }
      .pin-accent {
        position: absolute;
        right: 96px;
        bottom: 96px;
        width: 92px;
        height: 92px;
      }
      .eyebrow {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #e35a18;
      }
      .title {
        font-size: 132px;
        font-weight: 800;
        line-height: 0.96;
        letter-spacing: -0.035em;
        margin: 28px 0 0 0;
      }
      .tagline {
        font-size: 42px;
        font-weight: 500;
        color: #3a3447;
        margin-top: 28px;
        max-width: 820px;
        line-height: 1.18;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 24px;
        color: #6b6577;
      }
      .url {
        font-weight: 600;
        color: #1a1620;
        letter-spacing: -0.005em;
      }
      .chips {
        display: flex;
        gap: 14px;
      }
      .chip {
        padding: 10px 18px;
        border-radius: 999px;
        background: #fde4d3;
        color: #e35a18;
        font-size: 22px;
        font-weight: 600;
      }
      .chip.dark {
        background: rgba(26, 22, 32, 0.06);
        color: #1a1620;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg
        class="pin"
        viewBox="0 0 48 48"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          fill="#e35a18"
          fill-rule="evenodd"
          d="M24 2C12.954 2 4 10.954 4 22c0 13.5 20 24 20 24s20-10.5 20-24C44 10.954 35.046 2 24 2Zm0 28a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"
        />
      </svg>

      <div>
        <div class="eyebrow">Almedalsveckan · 22–28 juni</div>
        <h1 class="title">Almedalen<br />2026</h1>
        <p class="tagline">
          Hitta dina evenemang — karta, schema, sök och vad som händer just nu.
        </p>
      </div>

      <div class="footer">
        <div class="chips">
          <span class="chip">Karta</span>
          <span class="chip dark">Schema</span>
          <span class="chip dark">För dig</span>
        </div>
        <div class="url">almedalen.app</div>
      </div>

      <svg
        class="pin-accent"
        viewBox="0 0 48 48"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          fill="#e35a18"
          fill-rule="evenodd"
          d="M24 2C12.954 2 4 10.954 4 22c0 13.5 20 24 20 24s20-10.5 20-24C44 10.954 35.046 2 24 2Zm0 28a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"
        />
      </svg>
    </div>
  </body>
</html>
